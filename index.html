<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Crypto - Login/Registrierung</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #000000 50%, #000000 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(15, 15, 15, 0.95) 100%);
      border: 1px solid rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 65px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      color: #D4AF37;
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.45);
      letter-spacing: 2px;
      font-weight: 800;
    }

    \.subtitle { text-align: center; color: #ffffff;
      font-size: 14px;
      margin-bottom: 30px;
      font-style: italic;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #D4AF37;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: rgba(30, 30, 30, 0.8);
      border: 1px solid #000000;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input::placeholder { color: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: #D4AF37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-login {
      background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
      color: #000;
      font-weight: 700;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
    }

    .btn-register {
      background: linear-gradient(135deg, #111111 0%, #2d2306 100%);
      color: #FFD700;
      font-weight: 700;
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
    }

    .error {
      color: #D4AF37;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      color: #D4AF37;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #ffffff;
      font-size: 13px;
    }

    .toggle-form a {
      color: #D4AF37;
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
    }

    .toggle-form a:hover {
      text-decoration: underline;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    .form-title {
      text-align: center;
      color: #D4AF37;
      font-size: 20px;
      margin-bottom: 25px;
      font-weight: bold;
    }

    #loginForm {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ROYAL CRYPTO</h1>
    <p class="subtitle">Authentifizierung erforderlich</p>

    <!-- Login Form -->
    <div id="loginForm" class="form active">
      <div class="form-title">Anmelden</div>
      <div class="form-group">
        <label>👤 Benutzername:</label>
        <input type="text" id="loginUsername" placeholder="z.B. Max Mustermann">
        <div class="error" id="loginUsernameError"></div>
      </div>

      <div class="form-group">
        <label>📞 Telefonnummer:</label>
        <input type="text" id="loginPhone" placeholder="z.B. 0171 1234567">
        <div class="error" id="loginPhoneError"></div>
      </div>

      <div class="form-group">
        <label>�🔐 Passwort:</label>
        <input type="password" id="loginPassword" placeholder="Gib dein Passwort ein">
        <div class="error" id="loginPasswordError"></div>
      </div>

      <div class="button-group">
        <button class="btn-login" onclick="login()">ANMELDEN</button>
        <button class="btn-register" onclick="toggleForm()">REGISTRIEREN</button>
      </div>

      <div class="toggle-form">
        Noch kein Konto? <a onclick="toggleForm()">Jetzt registrieren</a>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="form">
      <div class="form-title">Registrieren</div>
      <div class="form-group">
        <label>👤 Benutzername:</label>
        <input type="text" id="registerUsername" placeholder="z.B. Max Mustermann">
        <div class="error" id="registerUsernameError"></div>
      </div>

      <div class="form-group">
        <label>🔐 Passwort:</label>
        <input type="password" id="registerPassword" placeholder="Gib dein Passwort ein">
        <div class="error" id="registerPasswordError"></div>
      </div>

      <div class="form-group">
        <label>� Telefonnummer:</label>
        <input type="text" id="registerPhone" placeholder="z.B. 0171 1234567">
        <div class="error" id="registerPhoneError"></div>
      </div>

      <div class="button-group">
        <button class="btn-login" onclick="toggleForm()">ANMELDEN</button>
        <button class="btn-register" onclick="register()">REGISTRIEREN</button>
      </div>

      <div class="success" id="registerSuccess">Registrierung erfolgreich! Du kannst dich jetzt anmelden.</div>
      <div class="error" id="registerError"></div>

      <div class="toggle-form">
        Hast du bereits ein Konto? <a onclick="toggleForm()">Hier anmelden</a>
      </div>
    </div>
  </div>

  <script>
    function toggleForm() {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      loginForm.classList.toggle('active');
      registerForm.classList.toggle('active');

      // Fehler zurücksetzen
      clearErrors();
    }

    function clearErrors() {
      document.querySelectorAll('.error').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
      document.querySelectorAll('.success').forEach(el => {
        el.classList.remove('show');
        el.textContent = '';
      });
    }

    function runningStatically() {
      return location.hostname.endsWith('github.io') || location.protocol === 'file:';
    }

    async function tryParseJson(response) {
      const text = await response.text();
      if (!text) return null;
      try {
        return JSON.parse(text);
      } catch (e) {
        return null;
      }
    }

    function getDashboardPath() {
      return 'dashboard.html';
    }

    function goToDashboard() {
      if (runningStatically()) {
        window.location.href = getDashboardPath();
      } else {
        window.location.href = '/dashboard';
      }
    }

    function offlineLogin(username, phone, password) {
      const users = JSON.parse(localStorage.getItem('offlineUsers') || '[]');
      const user = users.find(u => u.username === username && u.phone === phone && u.password === password);
      if (!user) return false;
      localStorage.setItem('offlineCurrentUser', username);
      goToDashboard();
      return true;
    }

    function offlineRegister(username, password, phone) {
      const users = JSON.parse(localStorage.getItem('offlineUsers') || '[]');
      if (users.find(u => u.username === username || u.phone === phone)) {
        showError('registerUsernameError', 'Benutzername oder Telefonnummer existiert bereits');
        return true;
      }
      users.push({ username, password, phone, balance: 0, is_admin: false });
      localStorage.setItem('offlineUsers', JSON.stringify(users));
      document.getElementById('registerSuccess').classList.add('show');
      document.getElementById('registerSuccess').textContent = 'Registrierung erfolgreich! Du kannst dich jetzt anmelden.';
      setTimeout(() => {
        toggleForm();
        document.getElementById('loginUsername').value = username;
      }, 1500);
      return true;
    }

    async function login() {
      clearErrors();
      const username = document.getElementById('loginUsername').value;
      const phone = document.getElementById('loginPhone').value;
      const password = document.getElementById('loginPassword').value;

      if (!username) {
        showError('loginUsernameError', 'Benutzername erforderlich');
        return;
      }
      if (!phone) {
        showError('loginPhoneError', 'Handynummer erforderlich');
        return;
      }
      if (!password) {
        showError('loginPasswordError', 'Passwort erforderlich');
        return;
      }

      if (runningStatically()) {
        const users = JSON.parse(localStorage.getItem('offlineUsers') || '[]');
        const user = users.find(u => u.username === username && u.phone === phone && u.password === password);
        if (user) {
          localStorage.setItem('offlineCurrentUser', username);
          window.location.href = '/dashboard.html';
        } else {
          showError('loginUsernameError', 'Ungültige Anmeldedaten (offline)');
        }
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, phone, password })
        });

        const data = await tryParseJson(response);

        if (response.ok) {
          goToDashboard();
        } else if (data) {
          showError('loginUsernameError', data.error || 'Login fehlgeschlagen');
        } else if (offlineLogin(username, phone, password)) {
          return;
        } else {
          showError('loginUsernameError', 'Server nicht erreichbar. Bitte Backend hosten oder lokal starten.');
        }
      } catch (error) {
        if (!offlineLogin(username, phone, password)) {
          showError('loginUsernameError', 'Server nicht erreichbar. Bitte Backend hosten oder lokal starten.');
        }
      }
    }

    async function register() {
      clearErrors();
      const username = document.getElementById('registerUsername').value;
      const password = document.getElementById('registerPassword').value;
      const phone = document.getElementById('registerPhone').value;

      if (!username) {
        showError('registerUsernameError', 'Benutzername erforderlich');
        return;
      }
      if (!password) {
        showError('registerPasswordError', 'Passwort erforderlich');
        return;
      }
      if (!phone || !/^\d{5,15}$/.test(phone)) {
        showError('registerPhoneError', 'Gültige Telefonnummer erforderlich');
        return;
      }

      if (runningStatically()) {
        const users = JSON.parse(localStorage.getItem('offlineUsers') || '[]');
        if (users.find(u => u.username === username || u.phone === phone)) {
          showError('registerUsernameError', 'Benutzername oder Telefonnummer existiert bereits');
          return;
        }
        users.push({ username, password, phone, balance: 0, is_admin: false });
        localStorage.setItem('offlineUsers', JSON.stringify(users));
        document.getElementById('registerSuccess').classList.add('show');
        document.getElementById('registerSuccess').textContent = 'Registrierung erfolgreich! Du kannst dich jetzt anmelden.';
        setTimeout(() => {
          toggleForm();
          document.getElementById('loginUsername').value = username;
        }, 1500);
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, phone })
        });

        const data = await tryParseJson(response);

        if (response.ok) {
          document.getElementById('registerSuccess').classList.add('show');
          document.getElementById('registerSuccess').textContent = 'Registrierung erfolgreich! Du kannst dich jetzt anmelden.';
          setTimeout(() => {
            toggleForm();
            document.getElementById('loginUsername').value = username;
          }, 1500);
        } else if (data) {
          showError('registerUsernameError', (data && data.error) || 'Registrierung fehlgeschlagen');
        } else if (offlineRegister(username, password, phone)) {
          return;
        } else {
          showError('registerUsernameError', 'Server nicht erreichbar. Bitte Backend hosten oder lokal starten.');
        }
      } catch (error) {
        if (!offlineRegister(username, password, phone)) {
          showError('registerUsernameError', 'Server nicht erreichbar. Bitte Backend hosten oder lokal starten.');
        }
      }
    }

    function showError(elementId, message) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.classList.add('show');
    }

    // Enter-Taste unterstützen
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const loginForm = document.getElementById('loginForm');
        if (loginForm.classList.contains('active')) {
          login();
        } else {
          register();
        }
      }
    });
  </script>
</body>
</html>
